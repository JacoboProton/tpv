services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tpv
      POSTGRES_PASSWORD: tpv_local_dev
      POSTGRES_DB: tpv_restaurant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpv -d tpv_restaurant"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://tpv:tpv_local_dev@postgres:5432/tpv_restaurant
      TPV_API_KEY: dev_local_key_cambiar
      CRON_SECRET: dev_cron_secret
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
